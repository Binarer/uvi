spring.application.name=uvi

# ===== Database =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/uvi}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres_secret}

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AaaaaaaaaaaaaUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.generate_statistics=false

# ===== HikariCP =====
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.pool-name=UviHikariPool

# ===== Virtual Threads (Java 21+, Project Loom) =====
spring.threads.virtual.enabled=true
spring.task.execution.pool.core-size=1
spring.task.execution.pool.max-size=1
spring.task.execution.pool.queue-capacity=0

# ===== JWT =====
jwt.secret=${JWT_SECRET:change-me-to-a-very-long-secret-key-at-least-32-chars}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===== MQTT =====
mqtt.broker.url=${MQTT_BROKER_URL:tcp://localhost:1883}
mqtt.client.id=${MQTT_CLIENT_ID:uvi-server}
mqtt.username=${MQTT_USERNAME:}
mqtt.password=${MQTT_PASSWORD:}
mqtt.topic.location=${MQTT_TOPIC_LOCATION:location/#}

# ===== Server =====
server.port=${SERVER_PORT:8080}

# ===== HTTP Compression =====
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info,metrics,threads
management.endpoint.health.show-details=always

# ===== OpenAPI / Swagger =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ===== SMS =====
sms.development_mode=${SMS_DEVELOPMENT_MODE:true}
sms.aero.api_key=${SMS_AERO_API_KEY:oDiE5FunAMFAAT7i41rAOlXElA9199SA}
sms.aero.email=${SMS_AERO_EMAIL:flihjkcey@gmail.com}

# ===== Logging =====
logging.level.org.springframework.web=${LOG_LEVEL_WEB:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:INFO}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springframework.integration.mqtt=${LOG_LEVEL_MQTT:INFO}
